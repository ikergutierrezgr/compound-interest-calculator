<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Interés Compuesto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Calculadora de Interés Compuesto</h1>

    <label>Capital inicial (€)</label>
    <input type="number" id="principal" value="1000">

    <label>Aporte mensual (€)</label>
    <input type="number" id="monthly" value="100">

    <label>Interés anual (%)</label>
    <input type="number" id="rate" value="7" min="0" step="0.1">

    <label>Años</label>
    <input type="number" id="years" value="20">

    <div id="errorMessage" class="error hidden"></div>

    <button onclick="calculate()">Calcular</button>

    <h2 id="result"></h2>

    <div class="chart-container hidden" id="chartContainer">
      <canvas id="growthChart"></canvas>
    </div>

    <div class="table-wrapper">
      <table id="resultsTable" class="hidden">
            <thead>
                <tr>
                <th>Año</th>
                <th>Invertido ese año</th>
                <th>Total invertido</th>
                <th>Beneficios</th>
                <th>Total acumulado</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
      </div>
    </div>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
